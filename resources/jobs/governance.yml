resources:
  jobs:
    governance_setup:
      name: platform-governance-setup
      description: >
        Runs on every CI deploy. Creates masking UDFs in admin.shared and
        applies catalog-level ABAC policies on silver and gold.
        Idempotent (CREATE OR REPLACE) — safe to re-run manually at any time.

      # Pinned so this always executes as the platform team's own SP,
      # regardless of which identity deployed/triggered it —
      # dbplat-simple-github-actions (the CI/OIDC deploy identity) is meant
      # only to deploy the bundle, not to run governance SQL itself.
      run_as:
        service_principal_name: ${var.platform_sp_id}

      tasks:
        - task_key: create_udfs
          description: "Create type-specific masking UDFs in admin.shared"
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ${workspace.file_path}/governance/create_udfs.sql

        - task_key: create_policies
          description: "Create catalog-level ABAC policies on silver and gold"
          depends_on:
            - task_key: create_udfs
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ${workspace.file_path}/governance/create_policies.sql

        - task_key: create_erasure_tables
          description: "Create the SAR erasure audit trail tables in admin.erasure"
          depends_on:
            - task_key: create_udfs
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ${workspace.file_path}/governance/create_erasure_tables.sql

        - task_key: create_access_tables
          description: "Create the SAR Article 15 access-report audit trail tables in admin.access"
          depends_on:
            - task_key: create_udfs
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ${workspace.file_path}/governance/create_access_tables.sql

        - task_key: create_lineage_cache_tables
          description: "Create the deduplicated lineage-edge cache tables in admin.lineage_cache"
          depends_on:
            - task_key: create_udfs
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ${workspace.file_path}/governance/create_lineage_cache_tables.sql

    governance_daily:
      name: platform-governance-daily
      description: >
        Scheduled daily monitoring job. Applies Auto TTL to tables with a
        _delete_at column, computes freshness metrics, rebuilds the
        admin.shared.retention_compliance view, and triggers a refresh of the
        SAR app's lineage-edge cache. Paused by default in demo environments —
        unpause in the Databricks UI when needed.

      schedule:
        quartz_cron_expression: "0 0 1 * * ?"
        timezone_id: "Europe/London"
        pause_status: PAUSED

      # See governance_setup's run_as comment above — same reasoning.
      run_as:
        service_principal_name: ${var.platform_sp_id}

      tasks:
        - task_key: apply_auto_ttl
          description: "Apply Auto TTL to all managed tables that have a _delete_at column"
          notebook_task:
            notebook_path: ${workspace.file_path}/governance/apply_auto_ttl

        - task_key: compute_freshness_metrics
          description: "Compute MAX(_updated_at) per table and write to admin.shared.freshness_metrics"
          notebook_task:
            notebook_path: ${workspace.file_path}/governance/compute_freshness_metrics

        - task_key: create_retention_compliance_view
          description: "Rebuild admin.shared.retention_compliance view with latest retention and freshness data"
          depends_on:
            - task_key: apply_auto_ttl
            - task_key: compute_freshness_metrics
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ${workspace.file_path}/governance/create_retention_compliance_view.sql

        - task_key: refresh_dashboard
          description: "Refresh the Platform Data Governance dashboard with latest compliance data"
          depends_on:
            - task_key: create_retention_compliance_view
          dashboard_task:
            dashboard_id: ${resources.dashboards.platform_governance.id}
            warehouse_id: ${var.warehouse_id}

        - task_key: refresh_access_audit_dashboard
          description: "Refresh the Platform Access Audit dashboard from system.access.audit"
          dashboard_task:
            dashboard_id: ${resources.dashboards.access_audit.id}
            warehouse_id: ${var.warehouse_id}

        - task_key: refresh_lineage_cache
          description: "Trigger the standalone lineage_cache_refresh job (see resources/jobs/lineage_cache_refresh.yml) — kept as its own job, not an inline task here, so the SAR app can also trigger it on demand"
          run_job_task:
            job_id: ${resources.jobs.lineage_cache_refresh.id}
