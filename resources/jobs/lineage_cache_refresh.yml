resources:
  jobs:
    lineage_cache_refresh:
      name: platform-lineage-cache-refresh
      description: >
        Incrementally refreshes admin.lineage_cache from
        system.access.table_lineage/column_lineage (see
        governance/refresh_lineage_cache.sql). A standalone job — not just a
        task inside governance_daily — specifically so the SAR app can trigger
        it on demand (via the "Refresh lineage cache now" sidebar button, see
        apps/sar_app/lineage.py: trigger_lineage_cache_refresh) as well as it
        running on governance_daily's schedule. This keeps the MERGE logic in
        exactly one place — the SQL file — rather than duplicated into the
        app's own Python.

      # Pinned so this always executes as the platform team's own SP,
      # regardless of who deployed the bundle or who triggers a run
      # (governance_daily's schedule, or the app's on-demand button via
      # jobs.run_now()) — dbplat-simple-github-actions (the CI/OIDC deploy
      # identity) is meant only to deploy, never to execute governance SQL
      # itself. Confirmed necessary: without this, a run failed with
      # INSUFFICIENT_PERMISSIONS on system.access, tracing back to the CI
      # deploy identity being the job's default run-as.
      run_as:
        service_principal_name: ${var.platform_sp_id}

      parameters:
        - name: lineage_cache_lookback_days
          default: "30"

      tasks:
        - task_key: refresh
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ${workspace.file_path}/governance/refresh_lineage_cache.sql
            parameters:
              lineage_cache_lookback_days: "{{job.parameters.lineage_cache_lookback_days}}"
