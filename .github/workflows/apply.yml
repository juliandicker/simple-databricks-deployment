name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/apply.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          TF_VAR_owner: ${{ secrets.OWNER }}
          TF_VAR_demo_user_password: ${{ secrets.DEMO_USER_PASSWORD }}

      - name: Capture Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          WS_URL=$(terraform output -raw workspace_url)
          echo "workspace_url=https://${WS_URL#https://}" >> $GITHUB_OUTPUT
          echo "workspace_id=$(terraform output -raw workspace_id)" >> $GITHUB_OUTPUT
          echo "pipeline_sp_id=$(terraform output -raw pipeline_sp_application_id)" >> $GITHUB_OUTPUT
          echo "platform_sp_id=$(terraform output -raw platform_sp_application_id)" >> $GITHUB_OUTPUT

      - name: Exchange Azure token for Databricks token
        run: |
          echo "DATABRICKS_TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)" >> $GITHUB_ENV

      - uses: databricks/setup-cli@main

      - name: Enable Data Classification on silver and gold
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: |
          databricks data-classification create-catalog-config "catalogs/silver" 2>&1 || true
          databricks data-classification create-catalog-config "catalogs/gold" 2>&1 || true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: tfl-disruption-data-pipeline,databricks-platform-governance

      - name: Push outputs to pipeline repo secrets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set AZURE_CLIENT_ID \
            --body "${{ steps.tf.outputs.pipeline_sp_id }}" \
            --repo juliandicker/tfl-disruption-data-pipeline
          gh secret set DATABRICKS_HOST \
            --body "${{ steps.tf.outputs.workspace_url }}" \
            --repo juliandicker/tfl-disruption-data-pipeline

      # databricks-platform-governance has no Terraform of its own — it's
      # enabled the same way tfl-disruption-data-pipeline is above, just
      # authenticating as sp-data-platform (platform_sp_id) instead of a
      # pipeline-specific SP. Its own deploy.yml uses these to deploy the
      # DABs bundle and run governance_setup directly. Not triggering its
      # workflow here on purpose — dbplat-deployment-bot is scoped to
      # secrets:write only (see docs), not actions:write, so it can't call
      # `gh workflow run` on that repo; and it isn't needed anyway, since
      # governance's config (warehouse_id, platform_sp_id) resolves fresh
      # via DABs lookups against the live workspace on every deploy of its
      # own, regardless of what changed here.
      - name: Push outputs to governance repo secrets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set AZURE_CLIENT_ID \
            --body "${{ steps.tf.outputs.platform_sp_id }}" \
            --repo juliandicker/databricks-platform-governance
          gh secret set DATABRICKS_HOST \
            --body "${{ steps.tf.outputs.workspace_url }}" \
            --repo juliandicker/databricks-platform-governance

      # Governed tag ASSIGN grants are not configurable via API and must be applied manually.
      # See the governance repo's docs/governed-tag-grants.md for the step-by-step procedure.

      - name: Create account usage dashboard (v2)
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
          DATABRICKS_ACCOUNT_ID: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          WORKSPACE_ID: ${{ steps.tf.outputs.workspace_id }}
        run: |
          pip install databricks-sdk --quiet
          python - <<'EOF'
          import os
          from databricks.sdk import AccountClient, WorkspaceClient
          from databricks.sdk.service.billing import UsageDashboardType, UsageDashboardMajorVersion

          w = WorkspaceClient(
              host=os.environ["DATABRICKS_HOST"],
              token=os.environ["DATABRICKS_TOKEN"],
          )
          existing = [d for d in w.lakeview.list() if d.display_name and "Account Usage Dashboard V2" in d.display_name]
          if existing:
              print(f"Account usage dashboard already exists — skipping ({len(existing)} found)")
          else:
              a = AccountClient(
                  host="https://accounts.azuredatabricks.net",
                  account_id=os.environ["DATABRICKS_ACCOUNT_ID"],
                  token=os.environ["DATABRICKS_TOKEN"],
              )
              a.usage_dashboards.create(
                  dashboard_type=UsageDashboardType.USAGE_DASHBOARD_TYPE_GLOBAL,
                  major_version=UsageDashboardMajorVersion.USAGE_DASHBOARD_MAJOR_VERSION_2,
                  workspace_id=int(os.environ["WORKSPACE_ID"]),
              )
              print("Account usage dashboard (v2) created")
          EOF
