name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          TF_VAR_owner: ${{ secrets.OWNER }}
          TF_VAR_cost_centre: ${{ secrets.COST_CENTRE }}
          TF_VAR_demo_user_password: ${{ secrets.DEMO_USER_PASSWORD }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: tfl-disruption-data-pipeline

      - name: Configure Data Classification and grant ASSIGN on class.* tags
        env:
          DATABRICKS_ACCOUNT_ID: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        run: |
          WORKSPACE_URL=$(terraform output -raw workspace_url)
          PIPELINE_SP=$(terraform output -raw pipeline_sp_application_id)
          TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)

          CLI_URL=$(curl -s \
            "https://api.github.com/repos/databricks/cli/releases/latest" \
            | grep '"browser_download_url"' \
            | grep 'linux_amd64' | grep '\.zip' \
            | cut -d'"' -f4 | head -1)
          curl -fsSL "${CLI_URL}" -o /tmp/db.zip
          unzip -j /tmp/db.zip -d /usr/local/bin/ >/dev/null 2>&1
          chmod +x /usr/local/bin/databricks

          WS_URL="https://${WORKSPACE_URL#https://}"
          export DATABRICKS_HOST="${WS_URL}"
          export DATABRICKS_TOKEN="${TOKEN}"

          # 1. Enable Data Classification on silver and gold (workspace-level).
          # "already exists" on re-runs is expected and harmless.
          databricks data-classification create-catalog-config "catalogs/silver" 2>&1 || true
          databricks data-classification create-catalog-config "catalogs/gold" 2>&1 || true
          echo "Data Classification configured on silver and gold"

          # 2. Grant ASSIGN on class.* governed tags to the pipeline SP.
          # Switches to account-level CLI auth (no TOKEN, uses Azure CLI session).
          unset DATABRICKS_TOKEN
          export DATABRICKS_HOST="https://accounts.azuredatabricks.net"

          for TAG in class.name class.email_address class.date_of_birth class.location; do
            RESOURCE="accounts/${DATABRICKS_ACCOUNT_ID}/tagPolicies/${TAG}"
            echo "--- ${TAG} ---"
            CURRENT=$(databricks account access-control get-rule-set "${RESOURCE}" 2>&1) || true
            echo "${CURRENT}"
            ETAG=$(echo "${CURRENT}" | grep -o '"etag":"[^"]*"' | cut -d'"' -f4)
            echo "ETag: '${ETAG}'"
            if [ -n "${ETAG}" ]; then
              databricks account access-control update-rule-set "${RESOURCE}" "${ETAG}" \
                --json "{\"rule_set\":{\"grant_rules\":[{\"role\":\"roles/databricks.tagPolicyAssign\",\"principals\":[\"servicePrincipals/${PIPELINE_SP}\"]}]}}" \
                2>&1 || true
            fi
          done
          echo "ASSIGN grant step complete"

      - name: Push outputs to pipeline repo secrets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set AZURE_CLIENT_ID \
            --body "$(terraform output -raw pipeline_sp_application_id)" \
            --repo juliandicker/tfl-disruption-data-pipeline
          gh secret set DATABRICKS_HOST \
            --body "$(terraform output -raw workspace_url)" \
            --repo juliandicker/tfl-disruption-data-pipeline
