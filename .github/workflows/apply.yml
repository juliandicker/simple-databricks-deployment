name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          TF_VAR_owner: ${{ secrets.OWNER }}
          TF_VAR_cost_centre: ${{ secrets.COST_CENTRE }}
          TF_VAR_demo_user_password: ${{ secrets.DEMO_USER_PASSWORD }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: tfl-disruption-data-pipeline

      - name: Grant ASSIGN on class.* governed tags to pipeline SP
        env:
          DATABRICKS_ACCOUNT_ID: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        run: |
          WORKSPACE_URL=$(terraform output -raw workspace_url)
          PIPELINE_SP=$(terraform output -raw pipeline_sp_application_id)
          TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)

          # Accounts API: follow redirect (-L) and show response + final URL
          echo "--- Accounts UC API (follow redirect) ---"
          curl -sL -X PATCH \
            "https://accounts.azuredatabricks.net/api/2.1/unity-catalog/permissions/governed_tag/class.name" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"changes\":[{\"principal\":\"${PIPELINE_SP}\",\"add\":[\"ASSIGN\"]}]}" \
            -w "\nHTTP %{http_code}\n" || true

          echo "--- Accounts tagPolicies API probe ---"
          curl -s -X GET \
            "https://accounts.azuredatabricks.net/api/2.0/accounts/${DATABRICKS_ACCOUNT_ID}/access-control/rule-sets/accounts/${DATABRICKS_ACCOUNT_ID}/tagPolicies/class.name" \
            -H "Authorization: Bearer ${TOKEN}" \
            -w "\nHTTP %{http_code}\n" || true

      - name: Push outputs to pipeline repo secrets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set AZURE_CLIENT_ID \
            --body "$(terraform output -raw pipeline_sp_application_id)" \
            --repo juliandicker/tfl-disruption-data-pipeline
          gh secret set DATABRICKS_HOST \
            --body "$(terraform output -raw workspace_url)" \
            --repo juliandicker/tfl-disruption-data-pipeline
