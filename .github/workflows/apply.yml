name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          TF_VAR_owner: ${{ secrets.OWNER }}
          TF_VAR_cost_centre: ${{ secrets.COST_CENTRE }}
          TF_VAR_demo_user_password: ${{ secrets.DEMO_USER_PASSWORD }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: tfl-disruption-data-pipeline

      - name: Enable Data Classification and grant ASSIGN on class.* tags
        run: |
          WORKSPACE_URL=$(terraform output -raw workspace_url)
          PIPELINE_SP=$(terraform output -raw pipeline_sp_application_id)
          TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)

          CLI_URL=$(curl -s \
            "https://api.github.com/repos/databricks/cli/releases/latest" \
            | grep '"browser_download_url"' \
            | grep 'linux_amd64' | grep '\.zip' \
            | cut -d'"' -f4 | head -1)
          curl -fsSL "${CLI_URL}" -o /tmp/db.zip
          unzip -j /tmp/db.zip -d /usr/local/bin/ >/dev/null 2>&1
          chmod +x /usr/local/bin/databricks

          WS_URL="https://${WORKSPACE_URL#https://}"
          export DATABRICKS_HOST="${WS_URL}"
          export DATABRICKS_TOKEN="${TOKEN}"

          # 1. Enable Data Classification (idempotent — "already exists" on re-runs).
          databricks data-classification create-catalog-config "catalogs/silver" 2>&1 || true
          databricks data-classification create-catalog-config "catalogs/gold" 2>&1 || true
          echo "Data Classification configured on silver and gold"

          # 2. Grant ASSIGN on class.* governed tags to the pipeline SP via SQL.
          # databricks_access_control_rule_set cannot target tag policies by key
          # (the accounts API requires a UUID as the IAM resource identifier).
          # SQL GRANT uses the tag key directly and executes under workspace auth.
          WAREHOUSE_ID=$(databricks warehouses list --output json 2>&1 \
            | jq -r 'if type=="array" then .[0].id else .warehouses[0].id end' 2>/dev/null)
          echo "Warehouse: ${WAREHOUSE_ID}"

          for TAG in "class.name" "class.email_address" "class.date_of_birth" "class.location"; do
            PAYLOAD=$(jq -n \
              --arg wid "${WAREHOUSE_ID}" \
              --arg sp "${PIPELINE_SP}" \
              --arg tag "${TAG}" \
              '{"warehouse_id":$wid,"statement":("GRANT ASSIGN ON GOVERNED TAG `"+$tag+"` TO `"+$sp+"`"),"wait_timeout":"30s"}')
            curl -s -X POST "${DATABRICKS_HOST}/api/2.0/sql/statements" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "${PAYLOAD}" | jq -c '.status // .' 2>/dev/null || true
            echo "ASSIGN attempted on ${TAG}"
          done
          echo "ASSIGN grant step complete"

      - name: Push outputs to pipeline repo secrets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set AZURE_CLIENT_ID \
            --body "$(terraform output -raw pipeline_sp_application_id)" \
            --repo juliandicker/tfl-disruption-data-pipeline
          gh secret set DATABRICKS_HOST \
            --body "$(terraform output -raw workspace_url)" \
            --repo juliandicker/tfl-disruption-data-pipeline
