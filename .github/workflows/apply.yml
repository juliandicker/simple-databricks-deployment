name: Terraform Apply + Governance

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "governance/**"
      - "resources/**"
      - "databricks.yml"
      - ".github/workflows/apply.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          TF_VAR_owner: ${{ secrets.OWNER }}
          TF_VAR_cost_centre: ${{ secrets.COST_CENTRE }}
          TF_VAR_demo_user_password: ${{ secrets.DEMO_USER_PASSWORD }}

      - name: Capture Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          WS_URL=$(terraform output -raw workspace_url)
          echo "workspace_url=https://${WS_URL#https://}" >> $GITHUB_OUTPUT
          echo "pipeline_sp_id=$(terraform output -raw pipeline_sp_application_id)" >> $GITHUB_OUTPUT
          echo "warehouse_id=$(terraform output -json team_warehouse_ids | jq -r '.data_platform_admins')" >> $GITHUB_OUTPUT
          printf 'exempt_sps=%s\n' "$(terraform output -json team_sp_application_ids | jq -r '[.[] | "`\(.)`"] | join(", ")')" >> $GITHUB_OUTPUT

      - name: Substitute SP IDs into governance SQL
        env:
          EXEMPT_SPS: ${{ steps.tf.outputs.exempt_sps }}
        run: sed -i "s|{{job.parameters.exempt_sps}}|${EXEMPT_SPS}|g" governance/create_policies.sql

      - name: Exchange Azure token for Databricks token
        run: |
          echo "DATABRICKS_TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)" >> $GITHUB_ENV

      - uses: databricks/setup-cli@main

      - name: Enable Data Classification on silver and gold
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: |
          databricks data-classification create-catalog-config "catalogs/silver" 2>&1 || true
          databricks data-classification create-catalog-config "catalogs/gold" 2>&1 || true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: tfl-disruption-data-pipeline

      - name: Push outputs to pipeline repo secrets
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set AZURE_CLIENT_ID \
            --body "${{ steps.tf.outputs.pipeline_sp_id }}" \
            --repo juliandicker/tfl-disruption-data-pipeline
          gh secret set DATABRICKS_HOST \
            --body "${{ steps.tf.outputs.workspace_url }}" \
            --repo juliandicker/tfl-disruption-data-pipeline

      - name: Generate governed tag grant SQL
        working-directory: terraform
        run: |
          tags=(
            class.name class.email_address class.phone_number class.ip_address
            class.location class.date_of_birth class.age class.iban_code
            class.credit_card class.us_bank_number class.vin class.driver_license
            class.us_driver_license class.passport class.us_passport class.us_ssn
            class.uk_nino class.uk_nhs class.de_id_card class.de_svnr class.de_tax_id
            class.ethnicity class.marital_status class.sexual_orientation class.criminal_background
          )
          out=../governance/grant_governed_tags.sql
          printf '%s\n' '-- Governed tag ASSIGN grants — generated by CI, do not edit manually' > "$out"
          terraform output -json team_sp_application_ids | jq -r '.[]' | while IFS= read -r sp_id; do
            for tag in "${tags[@]}"; do
              ns="${tag%%.*}"; tn="${tag#*.}"
              printf 'GRANT ASSIGN ON TAG `%s`.`%s` TO `%s`;\n' "$ns" "$tn" "$sp_id" >> "$out"
            done
          done
          for tag in "${tags[@]}"; do
            ns="${tag%%.*}"; tn="${tag#*.}"
            printf 'GRANT ASSIGN ON TAG `%s`.`%s` TO `sg-dbplat-data-stewards`;\n' "$ns" "$tn" >> "$out"
          done

      - name: Deploy governance bundle
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: databricks bundle deploy --var "warehouse_id=${{ steps.tf.outputs.warehouse_id }}"

      - name: Run governance setup
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
          EXEMPT_SPS: ${{ steps.tf.outputs.exempt_sps }}
        run: databricks bundle run governance_setup --var "warehouse_id=${{ steps.tf.outputs.warehouse_id }}"
