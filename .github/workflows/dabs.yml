name: Deploy Governance Bundle

on:
  push:
    branches: [main]
    paths:
      - "governance/**"
      - "resources/**"
      - "apps/**"
      - "dashboards/**"
      - "databricks.yml"
      - ".github/workflows/dabs.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Capture Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          WS_URL=$(terraform output -raw workspace_url)
          echo "workspace_url=https://${WS_URL#https://}" >> $GITHUB_OUTPUT
          SAR_SP_ID=$(terraform output -raw sar_app_sp_id)
          printf 'exempt_sps=%s\n' "$(terraform output -json team_sp_application_ids | jq -r --arg sar "$SAR_SP_ID" '([.[] | "`\(.)`"] + (if $sar != "" then ["`\($sar)`"] else [] end)) | join(", ")')" >> $GITHUB_OUTPUT
          echo "platform_sp_application_id=$(terraform output -raw platform_sp_application_id)" >> $GITHUB_OUTPUT
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Substitute SP IDs into governance SQL
        env:
          EXEMPT_SPS: ${{ steps.tf.outputs.exempt_sps }}
        run: sed -i "s|{{job.parameters.exempt_sps}}|${EXEMPT_SPS}|g" governance/create_policies.sql

      - name: Exchange Azure token for Databricks token
        run: |
          echo "DATABRICKS_TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)" >> $GITHUB_ENV

      - uses: databricks/setup-cli@main

      - name: Deploy governance bundle
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: databricks bundle deploy --force

      - name: Start SAR app
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: |
          STATE=$(databricks apps get platform-sar-app -o json | python3 -c "import sys,json; print(json.load(sys.stdin)['compute_status']['state'])")
          if [ "$STATE" = "ACTIVE" ]; then
            echo "App compute is already ACTIVE, skipping start."
          else
            # `apps start` already waits for ACTIVE state internally (20m default timeout).
            databricks apps start platform-sar-app
          fi

      - name: Deploy SAR app source
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: databricks apps deploy platform-sar-app

      # governance_setup deploys tables/UDFs into schemas the data_platform_admins
      # team owns (admin.shared, admin.erasure) — run it as that team's own SP
      # (sp-data-platform), not the bootstrap deploy identity, so it's subject to
      # the exact same schema grants any other data product team's pipeline would
      # be. This is the same deploy-vs-execute split the SAR app steps above use
      # (bootstrap identity deploys/starts the app; the app runs as its own SP).
      # sp-data-platform only has Databricks-side permissions (no Azure RBAC role
      # on the subscription — it doesn't need one, it's not managing Azure
      # resources here), so allow-no-subscriptions avoids azure/login's default
      # "find an accessible subscription" step, which would otherwise fail.
      - name: Azure login as data platform team (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ steps.tf.outputs.platform_sp_application_id }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Exchange platform team token for Databricks token
        run: |
          echo "PLATFORM_DATABRICKS_TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)" >> $GITHUB_ENV

      - name: Run governance setup
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
          DATABRICKS_TOKEN: ${{ env.PLATFORM_DATABRICKS_TOKEN }}
        run: databricks bundle run governance_setup
