name: Deploy Governance Bundle

on:
  push:
    branches: [main]
    paths:
      - "governance/**"
      - "resources/**"
      - "apps/**"
      - "dashboards/**"
      - "databricks.yml"
      - ".github/workflows/dabs.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Capture Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          WS_URL=$(terraform output -raw workspace_url)
          echo "workspace_url=https://${WS_URL#https://}" >> $GITHUB_OUTPUT
          SAR_SP_ID=$(terraform output -raw sar_app_sp_id)
          printf 'exempt_sps=%s\n' "$(terraform output -json team_sp_application_ids | jq -r --arg sar "$SAR_SP_ID" '([.[] | "`\(.)`"] + (if $sar != "" then ["`\($sar)`"] else [] end)) | join(", ")')" >> $GITHUB_OUTPUT
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Substitute SP IDs into governance SQL
        env:
          EXEMPT_SPS: ${{ steps.tf.outputs.exempt_sps }}
        run: sed -i "s|{{job.parameters.exempt_sps}}|${EXEMPT_SPS}|g" governance/create_policies.sql

      - name: Exchange Azure token for Databricks token
        run: |
          echo "DATABRICKS_TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)" >> $GITHUB_ENV

      - uses: databricks/setup-cli@main

      - name: Deploy governance bundle
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: databricks bundle deploy --force

      - name: Start SAR app
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: |
          STATE=$(databricks apps get platform-sar-app -o json | python3 -c "import sys,json; print(json.load(sys.stdin)['compute_status']['state'])")
          if [ "$STATE" = "ACTIVE" ]; then
            echo "App compute is already ACTIVE, skipping start."
          else
            # `apps start` already waits for ACTIVE state internally (20m default timeout).
            databricks apps start platform-sar-app
          fi

      - name: Deploy SAR app source
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: databricks apps deploy platform-sar-app

      # governance_setup deploys tables/UDFs into schemas the data_platform_admins
      # team owns (admin.shared, admin.erasure, admin.access, admin.lineage_cache)
      # — it runs as that team's own SP (sp-data-platform), pinned via run_as in
      # resources/jobs/governance.yml itself (resolved through databricks.yml's
      # platform_sp_id lookup variable), not via triggering it with a separate
      # identity here. This bootstrap/CI deploy identity only needs permission to
      # trigger the run (which it has, having just deployed the bundle) — the
      # pinned run_as is what guarantees the run executes as sp-data-platform
      # regardless of who triggers it, so dbplat-simple-github-actions stays
      # scoped to deployment only, never to executing governance SQL itself.
      - name: Run governance setup
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: databricks bundle run governance_setup
