name: Deploy Governance Bundle

on:
  push:
    branches: [main]
    paths:
      - "governance/**"
      - "resources/**"
      - "apps/**"
      - "dashboards/**"
      - "databricks.yml"
      - ".github/workflows/dabs.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v7

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Capture Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          WS_URL=$(terraform output -raw workspace_url)
          echo "workspace_url=https://${WS_URL#https://}" >> $GITHUB_OUTPUT
          printf 'exempt_sps=%s\n' "$(terraform output -json team_sp_application_ids | jq -r '[.[] | "`\(.)`"] | join(", ")')" >> $GITHUB_OUTPUT
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Substitute SP IDs into governance SQL
        env:
          EXEMPT_SPS: ${{ steps.tf.outputs.exempt_sps }}
        run: sed -i "s|{{job.parameters.exempt_sps}}|${EXEMPT_SPS}|g" governance/create_policies.sql

      - name: Exchange Azure token for Databricks token
        run: |
          echo "DATABRICKS_TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)" >> $GITHUB_ENV

      - uses: databricks/setup-cli@main

      - name: Deploy governance bundle
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: databricks bundle deploy --force

      - name: Start SAR app
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: databricks apps start platform-sar-app

      - name: Deploy SAR app source
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: |
          for i in $(seq 1 15); do
            databricks apps deploy platform-sar-app && break
            if [ $i -eq 15 ]; then exit 1; fi
            echo "Pending deployment in progress, waiting 90s (attempt $i/15)..."
            sleep 90
          done

      - name: Run governance setup
        env:
          DATABRICKS_HOST: ${{ steps.tf.outputs.workspace_url }}
        run: databricks bundle run governance_setup
