bundle:
  name: platform-governance

variables:
  warehouse_id:
    description: >
      SQL warehouse ID for governance statement execution.
      Resolved by name lookup — data_platform_admins-sql-warehouse is created by Terraform.
    lookup:
      warehouse: data_platform_admins-sql-warehouse

sync:
  exclude:
    - terraform/**
    - scripts/**
    - .github/**
    - "*.md"
    - .gitignore

targets:
  dev:
    default: true

include:
  - resources/jobs/*.yml
  - resources/dashboards/*.yml
  - resources/apps/*.yml
