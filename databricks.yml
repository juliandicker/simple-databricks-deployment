bundle:
  name: platform-governance

variables:
  warehouse_id:
    description: >
      SQL warehouse ID for governance statement execution.
      Injected at deploy time from terraform output team_warehouse_ids.data_platform_admins.
  platform_sp_id:
    description: >
      Application ID of the data platform admin SP.
      Injected at deploy time from terraform output platform_sp_application_id.

sync:
  exclude:
    - terraform/**
    - scripts/**
    - .github/**
    - "*.md"
    - .gitignore

targets:
  dev:
    default: true

include:
  - resources/jobs/*.yml
